<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vishnu Mali | Registration Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <div class="logo-icon"></div>
            <span>VishnuMali..</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="skills.html">Skills</a>
            <a href="project.html">Project</a>
            <a href="college.html">College</a>
            <a href="registration.html" class="active">Registration</a>
        </div>

    </nav>

    <main class="page-container">
        <h1 class="page-title">Student Registration Form</h1>
        
        <div class="glass-card form-card">
            <form>
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" class="form-control" placeholder="Enter your full name">
                </div>
                
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-control" placeholder="Enter your email address">
                </div>
                
                <div class="form-group">
                    <label>Mobile</label>
                    <input type="tel" class="form-control" placeholder="Enter your mobile number">
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" placeholder="Create a password">
                </div>
                
                <div class="form-group radio-group">
                    <label>Gender</label>
                    <div class="radio-options">
                        <label><input type="radio" name="g" class="radio-input"> Male</label>
                        <label><input type="radio" name="g" class="radio-input"> Female</label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Course</label>
                    <select class="form-control">
                        <option>BCA</option>
                        <option>B.Sc</option>
                        <option>B.Tech</option>
                        <option>MCA</option>
                    </select>
                </div>
                
                <div class="form-actions">
                    <input type="submit" class="btn-primary form-btn" value="Register">
                    <input type="reset" class="btn-secondary form-btn" value="Clear">
                </div>
            </form>
        </div>

        <div class="action-buttons">
            <a href="registration.html" class="btn-secondary">⬅ Back to Registration</a>
        </div>
    </main>
</body>
</html>
